server.port=9083
spring.application.name=availability-service

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:availabilitydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true

# To Ensure Hibernate creates the tables BEFORE data_sql runs
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.ddl-auto=create-drop
# H2 Console Settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Initialize Database with data_sql
spring.sql.init.mode=always
# Spring Kafka
spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Redis Config (Points to your Docker container)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka Config
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=availability-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*