server.port=9080
spring.application.name=gateway-service
logging.level.org.springframework.cloud.gateway.server.mvc=DEBUG
logging.level.org.springframework.web.servlet.functionc=TRACE
#logging.level.org.springframework.cloud.loadbalancer=DEBUG
debug=false
# Keep track of the last 10 requests
resilience4j.circuitbreaker.instances.listings_cb.sliding-window-size=10
resilience4j.circuitbreaker.instances.pricing_cb.sliding-window-size=10
resilience4j.circuitbreaker.instances.availability_cb.sliding-window-size=10
# If 50% of the sliding-window-size requests are failing
# i.e 5/10 requests, in our case, fails circuit breaker will be OPEN
resilience4j.circuitbreaker.instances.listings_cb.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.pricing_cb.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.availability_cb.failure-rate-threshold=50
# After the circuit breaker triggers, it will stay OPEN for 5s
# After 5s it will move into HALF_OPEN state
resilience4j.circuitbreaker.instances.listings_cb.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.pricing_cb.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.availability_cb.wait-duration-in-open-state=5s

# Bulkheads are used to isolate resources so that one bulkhead failure does not affect
# the others.Multiple services can share the same thread, and when on service becomes slow
# it forces others to wait thus cascading the failures.

#resilience4j.bulkhead.instances.gateway_cb.max-concurrent-calls=20
#resilience4j.bulkhead.instances.gateway_cb.max-wait-duration=100ms

resilience4j.thread-pool-bulkhead.instances.pricing_thread_pool.core-thread-pool-size=10
resilience4j.thread-pool-bulkhead.instances.pricing_thread_pool.max-thread-pool-size=20
resilience4j.thread-pool-bulkhead.instances.pricing_thread_pool.queue-capacity=50

resilience4j.thread-pool-bulkhead.instances.listings_thread_pool.core-thread-pool-size=10
resilience4j.thread-pool-bulkhead.instances.listings_thread_pool.max-thread-pool-size=20
resilience4j.thread-pool-bulkhead.instances.listings_thread_pool.queue-capacity=50

resilience4j.thread-pool-bulkhead.instances.availability_thread_pool.core-thread-pool-size=10
resilience4j.thread-pool-bulkhead.instances.availability_thread_pool.max-thread-pool-size=20
resilience4j.thread-pool-bulkhead.instances.availability_thread_pool.queue-capacity=50

# Actuator, Micrometer and Zipkin Tracing
management.endpoints.web.exposure.include=health, info, prometheus

management.prometheus.metrics.export.enabled=true

# Sample 100% requests, use lower value in production
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

logging.pattern.level=%5p [${spring.application.name:}, %X{tarceId:-}, %X{spanId:-}]

